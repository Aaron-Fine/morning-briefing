# Morning Digest Configuration
# All API keys should be set as environment variables, not in this file.

schedule:
  cron: "0 6 * * *"  # 6:00 AM daily

delivery:
  method: smtp
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  # Set SMTP_USER and SMTP_PASSWORD as env vars
  # For Gmail, use an App Password: https://myaccount.google.com/apppasswords
  to_address: "morningDigest@lurkers.us"  # your email address
  from_name: "Morning Digest"
  subject_template: "Morning Digest — {date}"

llm:
  model: "accounts/fireworks/models/minimax-m2p7"
  max_tokens: 12000
  temperature: 0.4
  # Set FIREWORKS_API_KEY as env var

# Pipeline stage manifest — defines execution order and per-stage model config.
# Stages with no model config are deterministic (no LLM call).
# Each model config can override the global llm settings independently.
pipeline:
  stages:
    - name: collect
      # No model needed — pure data collection

    - name: enrich_articles
      model:
        provider: fireworks
        model: "accounts/fireworks/models/minimax-m2p7"
        max_tokens: 500
        temperature: 0.2

    - name: compress
      model:
        provider: fireworks
        model: "accounts/fireworks/models/minimax-m2p7"
        max_tokens: 2000
        temperature: 0.2

    # --- Phase 1: Domain analysis replaces monolithic synthesize ---
    - name: analyze_domain
      model:
        provider: fireworks
        model: "accounts/fireworks/models/minimax-m2p7"
        max_tokens: 10000
        temperature: 0.6

    - name: prepare_calendar
      # No model needed — deterministic

    - name: prepare_weather
      # No model needed — deterministic

    - name: prepare_spiritual_weekly
      model:
        provider: anthropic
        model: "claude-sonnet-4-6"
        max_tokens: 8192
        temperature: 0.3

    - name: prepare_spiritual
      model:
        provider: fireworks
        model: "accounts/fireworks/models/minimax-m2p7"
        max_tokens: 512
        temperature: 0.5

    - name: prepare_local
      # No model needed — deterministic filter

    - name: seams
      model:
        provider: anthropic
        model: "claude-sonnet-4-6"
        max_tokens: 8192
        temperature: 0.3
      turns:
        candidates:
          max_tokens: 6000
          temperature: 0.4
        annotations:
          max_tokens: 8192
          temperature: 0.3

    # --- Phase 3: Cross-domain synthesis ("editor-in-chief" pass) ---
    - name: cross_domain
      model:
        provider: fireworks
        model: "accounts/fireworks/models/minimax-m2p7"
        max_tokens: 16000
        temperature: 0.3
      turns:
        plan:
          max_tokens: 4000
          temperature: 0.4
        execute:
          max_tokens: 16000
          temperature: 0.3

    - name: coverage_gaps
      model:
        provider: fireworks
        model: "accounts/fireworks/models/minimax-m2p7"
        max_tokens: 3000
        temperature: 0.5

    - name: assemble
      # No model needed — template rendering

    - name: anomaly
      # No model needed — deterministic checks

    - name: briefing_packet
      # No model needed — deterministic assembly

    - name: send
      # No model needed — SMTP delivery

# Desk manifest — maps analysis desks to RSS feed categories.
# Each desk runs a focused LLM pass on its subset of sources.
desks:
  - { name: "geopolitics", categories: ["non-western", "western-analysis", "substack-independent", "global-south", "perspective-diversity"] }
  - { name: "defense_space", categories: ["defense-mil"] }
  - { name: "ai_tech", categories: ["ai-tech", "cyber"] }
  - { name: "energy_materials", categories: ["energy-materials"] }
  - { name: "culture_structural", categories: ["culture-structural"] }
  - { name: "science_biotech", categories: ["science-biotech"] }
  - { name: "econ", categories: ["econ-trade"] }

enrich_articles:
  enabled: true
  min_usable_chars: 200
  summarize_above_chars: 800
  canonical_summary_max_chars: 700
  max_fetches_per_run: 60
  cache_ttl_days: 30
  cache_failure_backoff_hours: 24
  per_host_concurrency: 2
  per_host_min_interval_ms: 500
  min_body_chars: 300
  timeout_seconds: 15
  impersonate: "chrome"

location:
  city: "Logan"
  state: "UT"
  region: "Cache Valley"
  latitude: 41.737
  longitude: -111.834

# --- SOURCE CONFIGURATION ---

youtube:
  # Uses yt-dlp — no API key required
  # Analysis channels: transcripts are pulled, compressed, and fed into the synthesis pipeline
  analysis_channels:
    - { handle: "roadswithbeau", name: "Beau of the Fifth Column" }
    - { handle: "t3dotgg", name: "Theo - t3.gg" }
    - { handle: "PerunAU", name: "Perun" }
    - { handle: "FoldingIdeas", name: "Folding Ideas" }
  lookback_hours: 48

weather:
  # Primary: NWS API (free, no key required)
  # Fallback: Open-Meteo (free, no key needed)
  provider: "nws"
  nws_station: "KLGU"  # Logan-Cache Airport
  # Optional: AirNow API key for AQI forecast (register at airnowapi.org)
  # Set AIRNOW_API_KEY in .env — degrades gracefully if absent
  aqi_strip: true
  record_band: true
  normal_band: true
  dark_theme: true

markets:
  # Using Finnhub — set FINNHUB_API_KEY as env var
  # Using ETFs (SPY/DIA) instead of index symbols — Finnhub free tier doesn't support ^GSPC/^DJI
  symbols:
    - { symbol: "SPY", label: "S&P 500" }
    - { symbol: "DIA", label: "Dow" }
    - { symbol: "XAR", label: "Defense" }
    - { symbol: "XLE", label: "Energy" }

rss:
  # FreshRSS API endpoint (update when you migrate)
  # For now, can use direct RSS feeds
  provider: "direct"  # or "freshrss"
  freshrss_url: ""  # Placeholder — set when migrating to FreshRSS
  freshrss_user: ""  # Placeholder — set when migrating to FreshRSS
  freshrss_password: ""  # Placeholder — set when migrating to FreshRSS
  feeds:
    # --- NON-WESTERN ENGLISH-LANGUAGE OUTLETS ---
    # "What's missing" layer — flag when framing diverges from wire coverage
    - { url: "https://www.aljazeera.com/xml/rss/all.xml", name: "Al Jazeera", cap: 7, category: "non-western", reliability: "primary-reporting" }
    - { url: "https://scmp.com/rss/91/feed", name: "South China Morning Post", cap: 10, category: "non-western", reliability: "primary-reporting" }
    - { url: "https://asia.nikkei.com/rss/feed/nar", name: "Nikkei Asia", cap: 8, category: "non-western", reliability: "primary-reporting", enrich: { strategy: "skip" } }  # re-evaluate after body-fallback fix shows real summaries
    - { url: "https://www.thehindu.com/feeder/default.rss", name: "The Hindu", cap: 5, category: "non-western", reliability: "primary-reporting" }
    - { url: "https://www.dawn.com/feeds/home", name: "Dawn", cap: 5, category: "non-western", reliability: "primary-reporting" }
    - { url: "https://asiatimes.com/feed", name: "Asia Times", cap: 5, category: "non-western", reliability: "analysis-opinion" }

    # --- WESTERN ANALYSIS ---
    # "What it means" layer — interpretation and framing
    - { url: "https://www.theatlantic.com/feed/all/", name: "The Atlantic", cap: 8, category: "western-analysis", reliability: "analysis-opinion", enrich: { strategy: "fetch_with_cookies", cookies_file: "cookies/atlantic.cookies.txt" } }

    # --- DEFENSE / MILITARY ---
    - { url: "https://breakingdefense.com/feed/", name: "Breaking Defense", category: "defense-mil", reliability: "primary-reporting" }
    - { url: "https://www.airandspaceforces.com/feed/", name: "Air & Space Forces", category: "defense-mil", reliability: "primary-reporting" }
    - { url: "https://spacenews.com/feed/", name: "SpaceNews", category: "defense-mil", reliability: "primary-reporting", cooldown_on_429_seconds: 21600 }
    - { url: "https://warontherocks.com/feed/", name: "War on the Rocks", cap: 5, category: "defense-mil", reliability: "analysis-opinion" }
    - { url: "https://defenseacquisition.substack.com/feed", name: "Defense Tech and Acquisition", cap: 5, category: "defense-mil", reliability: "analysis-opinion" }

    # --- GEOPOLITICS / WORLD NEWS (Substack independent) ---
    - { url: "https://malcontentnews.substack.com/feed", name: "Malcontent News", category: "substack-independent", reliability: "primary-reporting" }
    - { url: "https://adamtooze.substack.com/feed", name: "Adam Tooze — Chartbook", cap: 3, category: "substack-independent", reliability: "analysis-opinion" }
    - { url: "https://chinatalk.substack.com/feed", name: "China Talk", cap: 3, category: "substack-independent", reliability: "analysis-opinion" }
    - { url: "https://sinification.substack.com/feed", name: "Sinification", cap: 3, category: "substack-independent", reliability: "analysis-opinion" }
    - { url: "https://proximities.substack.com/feed", name: "Proximities", cap: 5, category: "substack-independent", reliability: "analysis-opinion" }
    - { url: "https://danieldrezner.substack.com/feed", name: "Daniel Drezner", cap: 3, category: "substack-independent", reliability: "analysis-opinion" }
    - { url: "https://claireberlinski.substack.com/feed", name: "The Cosmopolitan Globalist", cap: 3, category: "substack-independent", reliability: "analysis-opinion" }
    - { url: "https://menatrack.substack.com/feed", name: "MenaTrack", cap: 5, category: "substack-independent", reliability: "analysis-opinion" }

    # --- AI / TECH ---
    - { url: "https://oneusefulthing.substack.com/feed", name: "One Useful Thing (Ethan Mollick)", cap: 3, category: "ai-tech", reliability: "analysis-opinion" }
    - { url: "https://importai.substack.com/feed", name: "Import AI (Jack Clark)", cap: 3, category: "ai-tech", reliability: "analysis-opinion" }
    - { url: "https://simonwillison.net/atom/everything/", name: "Simon Willison", cap: 8, category: "ai-tech", reliability: "analysis-opinion" }

    # --- ECONOMICS / TRADE ---
    - { url: "https://theovershoot.co/feed", name: "The Overshoot (Matt Klein)", cap: 3, category: "econ-trade", reliability: "analysis-opinion" }
    - { url: "https://www.cfr.org/series/follow-the-money", name: "Brad Setser", cap: 3, category: "econ-trade", reliability: "analysis-opinion", mode: "html_index", enrich: { strategy: "fetch" } }
    - { url: "https://www.ft.com/rss/home", name: "Financial Times", cap: 5, category: "econ-trade", reliability: "primary-reporting", enrich: { strategy: "skip" } }
    - { url: "https://www.economist.com/finance-and-economics/rss.xml", name: "The Economist (Finance & Economics)", cap: 5, category: "econ-trade", reliability: "analysis-opinion", enrich: { strategy: "skip" } }
    - { url: "https://www.reuters.com/markets/", name: "Reuters Markets", cap: 5, category: "econ-trade", reliability: "primary-reporting", mode: "html_index", cooldown_on_error_seconds: 21600, enrich: { strategy: "fetch" } }

    # --- GLOBAL SOUTH ---
    - { url: "https://www.ipsnews.net/news/headlines/feed/", name: "Inter Press Service", cap: 5, category: "global-south", reliability: "primary-reporting" }
    - { url: "https://chinaglobalsouth.com/news-feed/", name: "China Global South Project", cap: 3, category: "global-south", reliability: "analysis-opinion", mode: "html_index", enrich: { strategy: "fetch" } }

    # --- PERSPECTIVE DIVERSITY ---
    # "Stress test" layer — only surface when contradicting consensus
    - { url: "https://diff.substack.com/", name: "The Diff (Byrne Hobart)", cap: 3, category: "perspective-diversity", reliability: "analysis-opinion", mode: "html_index", enrich: { strategy: "fetch" } }
    - { url: "https://slowboring.substack.com/feed", name: "Slow Boring (Matt Yglesias)", cap: 3, category: "perspective-diversity", reliability: "analysis-opinion" }

    # --- CYBERSECURITY ---
    - { url: "https://ventureinsecurity.net/feed", name: "Venture in Security", cap: 3, category: "cyber", reliability: "analysis-opinion" }
    - { url: "https://risky.biz/feeds/risky-business-news/", name: "Risky Business", cap: 3, category: "cyber", reliability: "analysis-opinion" }

    # --- ENERGY / MATERIALS ---
    # Physical substrate of the economy: power, raw materials, grid, industrial capacity
    - { url: "https://utilitydive.com/feeds/news/", name: "Utility Dive", cap: 5, category: "energy-materials", reliability: "primary-reporting" }
    - { url: "https://www.mining.com/feed/", name: "Mining.com", cap: 5, category: "energy-materials", reliability: "primary-reporting" }
    - { url: "https://oilprice.com/rss/main", name: "OilPrice.com", cap: 5, category: "energy-materials", reliability: "primary-reporting" }
    - { url: "https://www.carbonbrief.org/feed", name: "Carbon Brief", cap: 5, category: "energy-materials", reliability: "analysis-opinion" }

    # --- CULTURE / STRUCTURAL ---
    # Institutional shifts only — not entertainment, celebrity, or discourse-chasing
    - { url: "https://www.theamericanconservative.com/feed/", name: "The American Conservative", cap: 3, category: "culture-structural", reliability: "analysis-opinion" }
    - { url: "https://worksinprogress.substack.com/feed", name: "Works in Progress", cap: 3, category: "culture-structural", reliability: "analysis-opinion" }
    - { url: "https://www.thenewatlantis.com/feed", name: "The New Atlantis", cap: 3, category: "culture-structural", reliability: "analysis-opinion" }
    - { url: "https://comment.org/feed/", name: "Comment Magazine", cap: 3, category: "culture-structural", reliability: "analysis-opinion" }

    # --- SCIENCE / BIOTECH ---
    # Frontier science and biotech with geopolitical or economic implications
    - { url: "https://www.nature.com/nature.rss", name: "Nature", cap: 5, category: "science-biotech", reliability: "primary-reporting", enrich: { strategy: "skip" } }
    - { url: "https://www.science.org/rss/news_current.xml", name: "Science Magazine", cap: 5, category: "science-biotech", reliability: "primary-reporting", enrich: { strategy: "skip" } }
    - { url: "https://www.statnews.com/feed/", name: "STAT News", cap: 5, category: "science-biotech", reliability: "primary-reporting" }
    - { url: "https://endpts.com/feed/", name: "Endpoints News", cap: 3, category: "science-biotech", reliability: "primary-reporting" }

    # --- LEGAL / INSTITUTIONAL ---
    - { url: "https://feeds.feedburner.com/lawfare", name: "Lawfare", cap: 5, category: "legal-institutional", reliability: "analysis-opinion" }
    - { url: "https://www.scotusblog.com/feed/", name: "SCOTUSblog", cap: 3, category: "legal-institutional", reliability: "analysis-opinion" }
    - { url: "https://www.justsecurity.org/feed/", name: "Just Security", cap: 3, category: "legal-institutional", reliability: "analysis-opinion" }

    # --- REGIONAL / WESTERN US ---
    - { url: "https://www.deseret.com/arc/outboundfeeds/rss/category/utah/", name: "Deseret News (Utah)", cap: 5, category: "regional-west", reliability: "primary-reporting" }
    - { url: "https://www.sltrib.com/arc/outboundfeeds/news/?outputType=xml", name: "Salt Lake Tribune (Utah)", cap: 5, category: "regional-west", reliability: "primary-reporting" }
    - { url: "https://www.sltrib.com/arc/outboundfeeds/religion/?outputType=xml", name: "Salt Lake Tribune (Religion)", cap: 5, category: "regional-west", reliability: "primary-reporting" }
    - { url: "https://www.sltrib.com/arc/outboundfeeds/culture/?outputType=xml", name: "Salt Lake Tribune (Culture)", cap: 5, category: "regional-west", reliability: "primary-reporting" }
    - { url: "https://www.kuer.org/news.rss", name: "KUER public radio", cap: 5, category: "regional-west", reliability: "primary-reporting" }

    # --- DEMOGRAPHICS ---
    - { url: "https://www.pewresearch.org/feed/", name: "Pew Research Center", cap: 3, category: "demographics", reliability: "primary-reporting" }
    - { url: "https://ifstudies.org/blog/rss", name: "Institute for Family Studies", cap: 3, category: "demographics", reliability: "primary-reporting" }

come_follow_me:
  # Scrape weekly from churchofjesuschrist.org
  base_url: "https://www.churchofjesuschrist.org/study/manual/come-follow-me-for-home-and-church-old-testament-2026"
  year: 2026

local_news:
  sources:
    - { url: "https://www.cachevalleydaily.com/search/?f=rss&t=article&l=25&s=start_time&sd=desc", name: "Cache Valley Daily" }
    - { url: "https://www.hjnews.com/search/?f=rss&t=article&c=news/local&l=25&s=start_time&sd=desc", name: "Herald Journal" }

# --- DIGEST PREFERENCES ---

topics:
  primary:
    - "World news / geopolitics / active conflicts"
    - "AI / LLMs / agentic technology"
  secondary:
    - "Defense / DoD / missile warning / missile defense"
    - "UARC / FFRDC news"
    - "Space technology and launch"
  tertiary:
    - "Self-hosting / privacy / open source"
    - "EVs / right-to-repair / consumer tech"
    - "Local news / Utah news"

digest:
  at_a_glance:
    min_items: 4
    normal_items: 5
    max_items: 7
  deep_dives:
    count: 2
    include_further_reading: true
  youtube:
    analysis_synthesis: true  # feed compressed transcripts into synthesis pipeline
  worth_reading:
    enabled: true
    count: 3
  week_ahead:
    enabled: true
    count: 5
  markets:
    enabled: true
  spiritual:
    enabled: true
    source: "come_follow_me"
  local:
    enabled: true
    max_items: 4

# Minimum viable digest on a quiet day:
# Even one good deep dive justifies sending the email.
quiet_day_policy: "always_send"
