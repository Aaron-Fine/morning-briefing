llm:
  provider: fireworks
  model: accounts/fireworks/models/kimi-k2p6
  max_tokens: 12000
  temperature: 0.4
pipeline:
  retry:
    max_retries: 1
    backoff_base_seconds: 5
  concurrency:
    collect_fetches: 6
    rss_feed_fetches: 6
    analyze_desks: 4
    compressions: 4
    enrich_articles: 4
  stages:
  - name: collect
    retry:
      max_retries: 1
      backoff_base_seconds: 5
  - name: enrich_articles
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/minimax-m2p7
      max_tokens: 500
      temperature: 0.2
  - name: compress
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/minimax-m2p7
      max_tokens: 2000
      temperature: 0.2
  - name: analyze_domain
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/kimi-k2p6
      max_tokens: 10000
      temperature: 0.6
  - name: prepare_calendar
  - name: prepare_weather
  - name: prepare_spiritual_weekly
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/kimi-k2p6
      max_tokens: 8192
      temperature: 0.3
  - name: prepare_spiritual
    retry:
      max_retries: 0
  - name: prepare_local
  - name: seams
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/kimi-k2p6
      max_tokens: 4000
      temperature: 0.3
    turns:
      annotations:
        max_tokens: 4000
        temperature: 0.3
  - name: cross_domain
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/kimi-k2p6
      max_tokens: 16000
      temperature: 0.3
    turns:
      plan:
        max_tokens: 4000
        temperature: 0.4
      execute:
        max_tokens: 16000
        temperature: 0.3
  - name: coverage_gaps
    retry:
      max_retries: 0
    model:
      provider: fireworks
      model: accounts/fireworks/models/minimax-m2p7
      max_tokens: 3000
      temperature: 0.5
  - name: assemble
  - name: anomaly
  - name: briefing_packet
  - name: send
desks:
- name: geopolitics
  categories:
  - non-western
  - western-analysis
  - substack-independent
  - global-south
  - perspective-diversity
- name: defense_space
  categories:
  - defense-mil
- name: ai_tech
  categories:
  - ai-tech
  - cyber
- name: energy_materials
  categories:
  - energy-materials
- name: culture_structural
  categories:
  - culture-structural
  - legal-institutional
  - demographics
- name: science_biotech
  categories:
  - science-biotech
- name: econ
  categories:
  - econ-trade
enrich_articles:
  enabled: true
  min_usable_chars: 200
  summarize_above_chars: 800
  summarize_native_above_chars: 1000000
  canonical_summary_max_chars: 700
  max_fetches_per_run: 10
  browser_fetch_enabled: true
  max_browser_fetches_per_run: 3
  browser_timeout_seconds: 30
  cache_ttl_days: 30
  cache_failure_backoff_hours: 24
  per_host_concurrency: 2
  per_host_min_interval_ms: 500
  min_body_chars: 300
  timeout_seconds: 15
  impersonate: chrome
  tier_caps:
    active:
      max_fetches: 10
      max_browser_fetches: 3
    low_frequency:
      max_fetches: 10
      max_browser_fetches: 3
    enrichment_required:
      max_fetches: 9999
      max_browser_fetches: 30
    headline_radar:
      max_fetches: 0
      max_browser_fetches: 0
    degraded:
      max_fetches: 0
      max_browser_fetches: 0
    broken:
      max_fetches: 0
      max_browser_fetches: 0
domain_research:
  enabled: true
  max_requests_per_desk: 1
  max_requests_total: 3
  allow_browser_fetch: false
seams:
  max_candidates: 5
  max_cross_domain_candidates: 2
  max_per_item_annotations: 6
  max_evidence_per_candidate: 2
  prompt_budget:
    candidate_text_chars: 220
    evidence_text_chars: 140
    raw_items_per_category: 8
    raw_summary_chars: 320
    domain_field_chars: 650
    transcript_chars: 350
cross_domain:
  connection_count: 3
  at_a_glance:
    primary_tags:
    - war
    - ai
    - defense
    primary_domain_tags:
      geopolitics: war
      ai_tech: ai
      defense_space: defense
    max_source_share: 0.4
    depth_priority:
      widely-reported: 0
      corroborated: 1
      single-source: 2
anomaly:
  primary_tags:
  - war
  - ai
  - defense
  tertiary_tags:
  - local
  - science
  - tech
  primary_domains:
  - geopolitics
  - defense_space
  - ai_tech
  max_source_absence_anomalies: 4
  max_repeated_phrase_anomalies: 6
  primary_headline_keywords:
  - war
  - iran
  - israel
  - ukraine
  - russia
  - conflict
  - combat
  - attack
  - military
  - missile
  - defense
  - pentagon
  - nato
  - hormuz
  - ai
  - artificial intelligence
  - llm
  - openai
  - anthropic
  - space
  - satellite
  - launch
  - cislunar
  - orbit
sanitize:
  rss_summary_chars: 500
  transcript_chars: 8000
http:
  user_agent: MorningDigest/1.0 (morningDigest@lurkers.us)
  timeout_seconds: 15
rss_fetch:
  timeout_seconds: 15
  parse_timeout_seconds: 10
  cooldown_on_429_seconds: 21600
  cooldown_on_error_seconds: 86400
