services:
  morning-digest:
    build:
      context: .
      args:
        # Match the container user to the host user so bind-mounted output/
        # files aren't root-owned. Override in .env for non-1000 hosts.
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: morning-digest
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      # Required — set these in your .env file or Unraid Docker template
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    volumes:
      # Mount config for easy editing without rebuilding
      - ./config:/app/config:ro
      # Optional: persist fallback HTML output
      - ./output:/app/output
      # Optional: authenticated article fetch cookies (gitignored)
      - ./cookies:/app/cookies:ro
      # Mount tests for running comparison tests
      - ./tests:/app/tests:ro
