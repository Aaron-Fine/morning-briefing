services:
  morning-digest:
    build: .
    container_name: morning-digest
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      # Required — set these in your .env file or Unraid Docker template
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      # Optional
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-}
    volumes:
      # Mount config for easy editing without rebuilding
      - ./config.yaml:/app/config.yaml:ro
      # Optional: persist fallback HTML output
      - ./output:/app/output
